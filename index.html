<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🔥 Live Loot Deals Tracker</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- ===================================================== -->
    <!-- HEADER -->
    <!-- ===================================================== -->

    <header class="bg-gradient-to-r from-red-600 via-orange-500 to-amber-500 text-white shadow-xl">

        <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row items-center justify-between">

            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold">
                    Live Loot Deals Tracker ⚡
                </h1>

                <p class="mt-2 text-sm opacity-90">
                    Real-Time Auto Updating Deals
                </p>
            </div>

            <div class="mt-4 md:mt-0 bg-white/20 px-4 py-2 rounded-xl backdrop-blur-md text-sm font-semibold">
                🟢 Auto Refresh Every 30 Seconds
            </div>

        </div>

    </header>

    <!-- ===================================================== -->
    <!-- SEARCH + FILTER -->
    <!-- ===================================================== -->

    <section class="max-w-7xl mx-auto w-full px-4 mt-8">

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 flex flex-col md:flex-row gap-4 items-center justify-between">

            <!-- Search -->

            <input
                type="text"
                id="search-input"
                placeholder="Search Deals..."
                oninput="filterDeals()"
                class="w-full md:w-96 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-500"
            >

            <!-- Filters -->

            <div class="flex flex-wrap gap-2 justify-center">

                <button onclick="filterStore('All')" class="store-btn bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-bold">
                    All
                </button>

                <button onclick="filterStore('Amazon')" class="store-btn bg-gray-100 px-4 py-2 rounded-lg text-sm font-bold">
                    Amazon
                </button>

                <button onclick="filterStore('Flipkart')" class="store-btn bg-gray-100 px-4 py-2 rounded-lg text-sm font-bold">
                    Flipkart
                </button>

                <button onclick="filterStore('Myntra')" class="store-btn bg-gray-100 px-4 py-2 rounded-lg text-sm font-bold">
                    Myntra
                </button>

                <button onclick="filterStore('Ajio')" class="store-btn bg-gray-100 px-4 py-2 rounded-lg text-sm font-bold">
                    Ajio
                </button>

                <button onclick="filterStore('Nykaa')" class="store-btn bg-gray-100 px-4 py-2 rounded-lg text-sm font-bold">
                    Nykaa
                </button>

            </div>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- DEALS GRID -->
    <!-- ===================================================== -->

    <main class="max-w-7xl mx-auto w-full px-4 py-8 flex-grow">

        <div
            id="deals-container"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
        >

            <!-- Loading -->

            <div class="col-span-full text-center py-16">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-orange-500 border-t-transparent mx-auto"></div>

                <p class="mt-4 text-gray-500 font-semibold">
                    Loading Deals...
                </p>
            </div>

        </div>

    </main>

    <!-- ===================================================== -->
    <!-- FOOTER -->
    <!-- ===================================================== -->

    <footer class="bg-gray-900 text-gray-400 text-center py-6 mt-auto">

        <p>
            © 2026 Live Loot Deals Tracker
        </p>

        <p class="text-xs text-gray-500 mt-1">
            Prices may change anytime.
        </p>

    </footer>

    <!-- ===================================================== -->
    <!-- JAVASCRIPT -->
    <!-- ===================================================== -->

   <script>

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=0";

let allDeals = [];
let currentStoreFilter = "All";


// =====================================================
// LOAD DEALS
// =====================================================

async function loadDeals() {

    try {

        const response = await fetch(SHEET_CSV_URL);

        if (!response.ok) {
            throw new Error("CSV Fetch Failed");
        }

        const csvText = await response.text();

        parseCSV(csvText);

        renderDeals(allDeals);

    }
    catch (error) {

        console.error(error);

        document.getElementById("deals-container").innerHTML = `
            <div class="col-span-full text-center py-16">

                <h2 class="text-red-500 text-2xl font-bold">
                    ❌ Data Loading Failed
                </h2>

                <p class="text-gray-500 mt-2">
                    Check Google Sheet Publish Settings
                </p>

            </div>
        `;
    }
}


// =====================================================
// PARSE CSV
// =====================================================

function parseCSV(csvText) {

    const rows = csvText.split("\n");

    allDeals = [];

    // Skip Header
    for (let i = 1; i < rows.length; i++) {

        if (!rows[i].trim()) continue;

        // Proper CSV Parsing
        const cols = rows[i]
            .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        if (cols.length < 7) continue;

        const product = {

            id: cols[0]?.replace(/"/g, "").trim(),

            title: cols[1]?.replace(/"/g, "").trim(),

            img: cols[2]?.replace(/"/g, "").trim(),

            oldPrice: parseInt(cols[3]) || 0,

            newPrice: parseInt(cols[4]) || 0,

            discount: cols[5]?.replace(/"/g, "").trim(),

            link: cols[6]?.replace(/"/g, "").trim()

        };

        // Store Detection
        if (product.title.toLowerCase().includes("amazon")) {
            product.store = "Amazon";
        }
        else if (product.title.toLowerCase().includes("flipkart")) {
            product.store = "Flipkart";
        }
        else if (product.title.toLowerCase().includes("myntra")) {
            product.store = "Myntra";
        }
        else if (product.title.toLowerCase().includes("ajio")) {
            product.store = "Ajio";
        }
        else if (product.title.toLowerCase().includes("nykaa")) {
            product.store = "Nykaa";
        }
        else {
            product.store = "Store";
        }

        allDeals.push(product);
    }

    // Latest First
    allDeals.reverse();
}


// =====================================================
// RENDER DEALS
// =====================================================

function renderDeals(deals) {

    const container =
        document.getElementById("deals-container");

    container.innerHTML = "";

    if (deals.length === 0) {

        container.innerHTML = `
            <div class="col-span-full text-center py-16">

                <p class="text-gray-500 text-xl">
                    No Deals Found
                </p>

            </div>
        `;

        return;
    }

    deals.forEach(deal => {

        let badgeColor = "bg-gray-700";

        if (deal.store === "Amazon")
            badgeColor = "bg-amber-500";

        if (deal.store === "Flipkart")
            badgeColor = "bg-blue-600";

        if (deal.store === "Myntra")
            badgeColor = "bg-pink-600";

        if (deal.store === "Ajio")
            badgeColor = "bg-indigo-600";

        if (deal.store === "Nykaa")
            badgeColor = "bg-purple-600";


        const card = `

        <div class="bg-white rounded-2xl shadow-sm hover:shadow-2xl border border-gray-100 overflow-hidden transition duration-300 p-4 flex flex-col justify-between">

            <div>

                <!-- IMAGE -->

                <div class="relative bg-gray-50 rounded-xl h-52 flex items-center justify-center overflow-hidden">

                    <img
                        src="${deal.img}"
                        alt="${deal.title}"
                        class="max-h-full max-w-full object-contain hover:scale-105 transition duration-300"
                        onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'"
                    >

                    <!-- Discount -->

                    <span class="absolute top-3 left-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-lg">

                        ${deal.discount}

                    </span>

                    <!-- Store -->

                    <span class="absolute top-3 right-3 ${badgeColor} text-white text-xs font-bold px-2 py-1 rounded-lg">

                        ${deal.store}

                    </span>

                </div>

                <!-- TITLE -->

                <h2 class="mt-4 text-sm font-semibold text-gray-800 line-clamp-2">

                    ${deal.title}

                </h2>

            </div>

            <!-- PRICE -->

            <div class="mt-4">

                <div class="flex items-center gap-2">

                    <span class="text-2xl font-black text-gray-900">

                        ₹${deal.newPrice}

                    </span>

                    <span class="text-sm text-gray-400 line-through">

                        ₹${deal.oldPrice}

                    </span>

                </div>

                <!-- BUTTON -->

                <a
                    href="${deal.link}"
                    target="_blank"
                    class="block text-center mt-4 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-3 rounded-xl transition"
                >

                    Grab Deal ➜

                </a>

            </div>

        </div>
        `;

        container.innerHTML += card;
    });
}


// =====================================================
// FILTER STORE
// =====================================================

function filterStore(storeName) {

    currentStoreFilter = storeName;

    filterDeals();
}


// =====================================================
// SEARCH FILTER
// =====================================================

function filterDeals() {

    const search =
        document.getElementById("search-input")
        .value
        .toLowerCase();

    const filtered = allDeals.filter(deal => {

        const storeMatch =
            currentStoreFilter === "All"
            || deal.store === currentStoreFilter;

        const searchMatch =
            deal.title.toLowerCase().includes(search);

        return storeMatch && searchMatch;
    });

    renderDeals(filtered);
}


// =====================================================
// AUTO REFRESH
// =====================================================

setInterval(loadDeals, 30000);


// =====================================================
// INITIAL LOAD
// =====================================================

window.onload = loadDeals;

</script>

</body>
</html>
