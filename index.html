<!-- =====================================================
FILE: index.html
Modern Dynamic Telegram Deal UI
===================================================== -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
    🔥 Best Deals
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

/* CATEGORY BUTTON */

.category-btn{

    background:#1e293b;
    color:white;

    padding:12px 22px;

    border-radius:999px;

    font-weight:600;

    transition:0.3s;

    white-space:nowrap;
}

.category-btn:hover{

    background:#334155;
}

.active-cat{

    background:linear-gradient(
        90deg,
        #f97316,
        #ef4444
    );
}

/* DEAL CARD */

.deal-card{

    background:#111827;

    border:1px solid #1f2937;

    transition:0.3s;

    overflow:hidden;

    position:relative;
}

.deal-card:hover{

    transform:translateY(-6px);

    border-color:#f97316;
}

/* GLASS EFFECT */

.glass{

    backdrop-filter:blur(10px);

    background:rgba(255,255,255,0.08);
}

/* CAPTION */

.caption{

    color:#cbd5e1;

    line-height:1.8;

    font-size:14px;

    white-space:pre-line;
}

</style>

</head>

<body>

<!-- ================================================= -->
<!-- HERO -->
<!-- ================================================= -->

<section
class="relative overflow-hidden border-b border-slate-800"
>

    <div
    class="absolute inset-0 bg-gradient-to-r from-orange-500/20 to-red-500/20"
    ></div>

    <div
    class="max-w-7xl mx-auto px-4 py-14 relative z-10"
    >

        <div
        class="flex flex-col lg:flex-row gap-10 items-center justify-between"
        >

            <div>

                <div
                class="inline-flex items-center gap-3 bg-orange-500/20 text-orange-300 px-5 py-2 rounded-full font-semibold"
                >

                    🔥 LIVE DEAL FEED

                </div>

                <h1
                class="text-5xl lg:text-7xl font-black text-white mt-6 leading-tight"
                >

                    Best Deals
                    <span class="text-orange-500">
                        Auto Updated
                    </span>

                </h1>

                <p
                class="text-slate-300 text-lg mt-6 max-w-2xl"
                >

                    Real-time Telegram deals with direct affiliate links,
                    product banners, discounts, and instant updates.

                </p>

            </div>

            <!-- LIVE STATUS -->

            <div
            class="glass rounded-3xl p-8 border border-slate-700"
            >

                <div
                class="text-slate-400 text-sm"
                >
                    STATUS
                </div>

                <div
                class="flex items-center gap-3 mt-3"
                >

                    <div
                    class="w-4 h-4 rounded-full bg-green-500 animate-pulse"
                    ></div>

                    <div
                    class="text-2xl font-black text-white"
                    >
                        LIVE
                    </div>

                </div>

                <div
                class="text-slate-400 mt-4"
                >
                    Telegram Auto Sync Enabled
                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================================================= -->
<!-- SEARCH + FILTER -->
<!-- ================================================= -->

<section
class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur border-b border-slate-800"
>

    <div
    class="max-w-7xl mx-auto px-4 py-5"
    >

        <!-- SEARCH -->

        <div
        class="flex flex-col lg:flex-row gap-4"
        >

            <input
                id="searchInput"
                type="text"
                placeholder="Search products, stores, deals..."
                class="w-full bg-slate-900 border border-slate-700 text-white rounded-2xl px-6 py-4 outline-none"
            />

        </div>

        <!-- CATEGORIES -->

        <div
        class="flex gap-3 mt-5 overflow-auto pb-2"
        >

            <button class="category-btn active-cat" data-category="All">
                All
            </button>

            <button class="category-btn" data-category="Mobiles">
                Mobiles
            </button>

            <button class="category-btn" data-category="Laptops">
                Laptops
            </button>

            <button class="category-btn" data-category="Fashion">
                Fashion
            </button>

            <button class="category-btn" data-category="Electronics">
                Electronics
            </button>

            <button class="category-btn" data-category="Other">
                Other
            </button>

        </div>

    </div>

</section>

<!-- ================================================= -->
<!-- DEAL GRID -->
<!-- ================================================= -->

<main
class="max-w-7xl mx-auto px-4 py-10"
>

    <div
    id="deals-container"
    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"
    >

    </div>

</main>

<!-- ================================================= -->
<!-- SCRIPT -->
<!-- ================================================= -->

<script>

let allDeals = [];

let currentCategory = "All";

async function loadDeals(){

    try{

        const response = await fetch(
            "deals.json?t=" + Date.now()
        );

        allDeals = await response.json();

        renderDeals();

    }catch(error){

        console.error(error);
    }
}

function renderDeals(){

    const container =
        document.getElementById(
            "deals-container"
        );

    const search =
        document.getElementById(
            "searchInput"
        ).value.toLowerCase();

    container.innerHTML = "";

    let filtered = allDeals.filter(deal => {

        const matchesSearch =

            deal.title.toLowerCase()
            .includes(search)

            ||

            deal.caption.toLowerCase()
            .includes(search);

        const matchesCategory =

            currentCategory === "All"

            ||

            deal.category === currentCategory;

        return (
            matchesSearch &&
            matchesCategory
        );
    });

    if(filtered.length === 0){

        container.innerHTML = `

            <div class="col-span-full text-center py-24">

                <h2 class="text-5xl font-black text-slate-500">

                    No Deals Found

                </h2>

            </div>

        `;

        return;
    }

    filtered.forEach(deal => {

        const buttons =

            deal.all_links.map((link,index)=>`

                <a
                    href="${link}"
                    target="_blank"
                    class="block bg-gradient-to-r from-orange-500 to-red-500 hover:scale-[1.02] transition text-white text-center py-4 rounded-2xl font-bold"
                >

                    🔥 Open Deal ${index+1}

                </a>

            `).join("");

        const card = `

        <div
        class="deal-card rounded-3xl"
        >

            <!-- IMAGE -->

            <div class="relative">

                <img
                    src="${deal.image}"
                    class="w-full h-[350px] object-cover"
                />

                <!-- OVERLAY -->

                <div
                class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"
                ></div>

                <!-- BADGES -->

                <div
                class="absolute top-4 left-4 flex gap-2"
                >

                    <div
                    class="bg-red-500 text-white px-4 py-2 rounded-full font-bold text-sm"
                    >
                        ${deal.discount}
                    </div>

                    <div
                    class="bg-orange-500 text-white px-4 py-2 rounded-full font-bold text-sm"
                    >
                        ${deal.category}
                    </div>

                </div>

                <!-- STORE -->

                <div
                class="absolute top-4 right-4 bg-black/70 text-white px-4 py-2 rounded-full font-bold text-sm"
                >
                    ${deal.store}
                </div>

                <!-- TITLE -->

                <div
                class="absolute bottom-0 p-6"
                >

                    <h2
                    class="text-2xl font-black text-white leading-tight"
                    >

                        ${deal.title}

                    </h2>

                </div>

            </div>

            <!-- CONTENT -->

            <div class="p-6">

                <!-- PRICE -->

                <div
                class="flex items-center gap-4"
                >

                    <div
                    class="text-4xl font-black text-white"
                    >
                        ₹${deal.new_price}
                    </div>

                    <div
                    class="text-xl line-through text-slate-500"
                    >
                        ₹${deal.old_price}
                    </div>

                </div>

                <!-- CAPTION -->

                <div
                class="caption mt-6"
                >

                    ${deal.caption}

                </div>

                <!-- LINKS -->

                <div
                class="mt-6 space-y-3"
                >

                    ${buttons}

                </div>

            </div>

        </div>

        `;

        container.innerHTML += card;
    });
}

/* SEARCH */

document.getElementById(
    "searchInput"
).addEventListener(
    "input",
    renderDeals
);

/* CATEGORY */

document.querySelectorAll(
    ".category-btn"
).forEach(btn => {

    btn.addEventListener("click", () => {

        document.querySelectorAll(
            ".category-btn"
        ).forEach(b =>
            b.classList.remove("active-cat")
        );

        btn.classList.add("active-cat");

        currentCategory =
            btn.dataset.category;

        renderDeals();
    });
});

/* LOAD */

loadDeals();

/* AUTO REFRESH */

setInterval(
    loadDeals,
    30000
);

</script>

</body>

</html>
