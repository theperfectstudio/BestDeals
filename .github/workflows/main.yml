name: Telegram Deal Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *' # દર ૬ કલાકે એકવાર સેફ્ટી માટે રીસ્ટાર્ટ થશે
  workflow_dispatch: # મેન્યુઅલ બટન

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Start Bot (Infinite Loop)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STR: ${{ secrets.SESSION_STR }}
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        # આ કમાન્ડ બોટને બેકગ્રાઉન્ડમાં સતત ચાલુ રાખશે
        run: python telegram_to_sheet.py
