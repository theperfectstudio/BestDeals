<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
    DealVerse 🔥
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{

    background:
    radial-gradient(circle at top left,#2563eb22,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed22,transparent 25%),
    #020617;

    overflow-x:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:999px;
}

/* GLASS */

.glass{

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
}

/* CATEGORY */

.category-btn{

    padding:10px 18px;

    border-radius:999px;

    background:#111827;

    border:1px solid #1e293b;

    color:white;

    transition:0.3s;

    font-weight:600;

    white-space:nowrap;

    font-size:14px;
}

.category-btn:hover{

    transform:translateY(-2px);

    background:#1e293b;
}

.active-cat{

    background:linear-gradient(
        90deg,
        #2563eb,
        #7c3aed
    );

    border:none;
}

/* DEAL CARD */

.deal-card{

    position:relative;

    overflow:hidden;

    border-radius:28px;

    background:#111827;

    border:1px solid #1e293b;

    transition:0.35s;

    cursor:pointer;
}

.deal-card:hover{

    transform:
    translateY(-6px)
    scale(1.01);

    border-color:#3b82f6;

    box-shadow:
    0 20px 50px rgba(37,99,235,0.22);
}

/* MODAL */

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.9);

    z-index:999;

    display:none;

    align-items:center;

    justify-content:center;

    padding:10px;
}

.modal-content{

    width:100%;

    max-width:1000px;

    max-height:95vh;

    overflow:auto;

    border-radius:30px;

    background:#0f172a;

    border:1px solid #1e293b;
}

/* MOBILE */

@media(max-width:768px){

    .hero-title{
        font-size:52px;
        line-height:1;
    }

    .modal-image{
        height:260px !important;
    }

    .deal-image{
        height:240px !important;
    }
}

</style>

</head>

<body>

<!-- HERO -->

<section
class="relative overflow-hidden border-b border-slate-800"
>

    <div
    class="absolute w-[600px] h-[600px] bg-blue-500/20 blur-[150px] -top-40 -left-40 rounded-full"
    ></div>

    <div
    class="absolute w-[600px] h-[600px] bg-purple-500/20 blur-[150px] bottom-0 right-0 rounded-full"
    ></div>

    <div
    class="max-w-7xl mx-auto px-4 py-14 relative z-10"
    >

        <div
        class="flex flex-col lg:flex-row items-center justify-between gap-10"
        >

            <!-- LEFT -->

            <div>

                <div
                class="inline-flex items-center gap-3 bg-blue-500/20 text-blue-300 px-5 py-3 rounded-full font-bold text-sm"
                >
                    ⚡ LIVE DEAL FEED
                </div>

                <h1
                class="hero-title text-6xl lg:text-8xl font-black text-white mt-8 leading-tight"
                >

                    Deal
                    <span class="text-blue-500">
                        Verse
                    </span>

                </h1>

                <p
                class="text-slate-300 text-lg mt-7 leading-8 max-w-2xl"
                >

                    ⚡ Discover Viral Deals Before Everyone Else
Real-time Telegram powered shopping offers, cashback finds & trending discounts — all in one dynamic experience. 🔥

                </p>

            </div>

            <!-- RIGHT -->

            <div class="hidden lg:block">

                <div
                class="glass rounded-[35px] p-5"
                >

                    <img
                    src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=1200"
                    class="w-[380px] rounded-[25px]"
                    />

                </div>

            </div>

        </div>

    </div>

</section>

<!-- SEARCH -->

<section
class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur border-b border-slate-800"
>

    <div
    class="max-w-7xl mx-auto px-4 py-5"
    >

        <input
            id="searchInput"
            type="text"
            placeholder="Search deals..."
            class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 outline-none text-white"
        />

        <!-- CATEGORY -->

        <div
        class="flex gap-3 mt-5 overflow-auto pb-2"
        >

            <button class="category-btn active-cat" data-category="All">
                All
            </button>

            <button class="category-btn" data-category="Mobiles">
                Mobiles
            </button>

            <button class="category-btn" data-category="Laptops">
                Laptops
            </button>

            <button class="category-btn" data-category="Fashion">
                Fashion
            </button>

            <button class="category-btn" data-category="Electronics">
                Electronics
            </button>

            <button class="category-btn" data-category="Other">
                Other
            </button>

        </div>

    </div>

</section>

<!-- DEALS -->

<main
class="max-w-7xl mx-auto px-4 py-10"
>

    <div
    id="deals-container"
    class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"
    >

    </div>

</main>

<!-- MODAL -->

<div
id="dealModal"
class="modal"
>

    <div
    class="modal-content"
    >

        <div id="modalBody"></div>

    </div>

</div>

<script>

let allDeals = [];

let currentCategory = "All";

/* LOAD */

async function loadDeals(){

    try{

        const response = await fetch(
            "deals.json?t=" + Date.now()
        );

        allDeals = await response.json();

        renderDeals();

    }catch(error){

        console.error(error);
    }
}

/* RENDER */

function renderDeals(){

    const container =
        document.getElementById(
            "deals-container"
        );

    const search =
        document.getElementById(
            "searchInput"
        ).value.toLowerCase();

    container.innerHTML = "";

    const filtered = allDeals.filter(deal => {

        const matchesSearch =

            deal.title.toLowerCase()
            .includes(search)

            ||

            deal.caption.toLowerCase()
            .includes(search);

        const matchesCategory =

            currentCategory === "All"

            ||

            deal.category === currentCategory;

        return (
            matchesSearch &&
            matchesCategory
        );
    });

    filtered.forEach((deal,index)=>{

        const discountBadge =

            deal.discount &&
            deal.discount !== "0% OFF"

            ?

            `

            <div
            class="absolute top-4 right-4 bg-gradient-to-r from-red-500 to-orange-500 px-4 py-2 rounded-full text-white font-black text-sm shadow-xl"
            >
                ${deal.discount}
            </div>

            `

            :

            "";

        const card = `

        <div
        class="deal-card group"
        onclick="openDeal(${index})"
        >

            <!-- IMAGE -->

            <div class="relative overflow-hidden">

                <img
                    src="${deal.image}"
                    class="deal-image w-full h-[240px] object-cover transition duration-500 group-hover:scale-110"
                />

                <!-- OVERLAY -->

                <div
                class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"
                ></div>

                <!-- HOT TAG -->

                <div
                class="absolute left-0 top-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2 rounded-r-full font-black text-xs tracking-wide shadow-xl"
                >
                    🔥 TRENDING
                </div>

                <!-- DISCOUNT -->

                ${discountBadge}

                <!-- BOTTOM CONTENT -->

                <div
                class="absolute bottom-0 p-5 w-full"
                >

                    <!-- CATEGORY + STORE -->

                    <div
                    class="flex items-center gap-2 mb-3 flex-wrap"
                    >

                        <div
                        class="bg-white/10 backdrop-blur text-white px-3 py-1 rounded-full text-xs font-bold border border-white/10"
                        >
                            ${deal.category}
                        </div>

                        <div
                        class="bg-black/40 backdrop-blur text-slate-200 px-3 py-1 rounded-full text-xs font-bold"
                        >
                            ${deal.store}
                        </div>

                    </div>

                    <!-- TITLE -->

                    <h2
                    class="text-xl font-black text-white leading-tight line-clamp-2"
                    >
                        ${deal.title}
                    </h2>

                </div>

            </div>

            <!-- LOWER SECTION -->

            <div class="p-5">

                <!-- DESCRIPTION -->

                <div
                class="text-slate-400 text-sm leading-7 line-clamp-3"
                >
                    ${deal.caption}
                </div>

                <!-- BUTTON -->

                <button
                class="mt-5 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-indigo-600 hover:to-blue-600 transition text-white py-4 rounded-2xl font-black shadow-xl"
                >
                    ⚡ VIEW DEAL
                </button>

            </div>

        </div>

        `;

        container.innerHTML += card;
    });
}

/* MODAL */

function openDeal(index){

    const deal = allDeals[index];

    const buttons = deal.all_links.map((link,i)=>`

        <a
            href="${link}"
            target="_blank"
            class="block bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-center py-4 rounded-2xl font-bold hover:scale-[1.02] transition"
        >
            🛒 Open Deal Link ${i+1}
        </a>

    `).join("");

    document.getElementById(
        "modalBody"
    ).innerHTML = `

        <div class="relative">

            <img
                src="${deal.image}"
                class="modal-image w-full h-[400px] object-cover"
            />

            <div
            class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"
            ></div>

            <button
                onclick="closeModal()"
                class="absolute top-5 right-5 bg-red-500 w-12 h-12 rounded-full text-2xl font-black"
            >
                ×
            </button>

            <div
            class="absolute bottom-0 p-6 w-full"
            >

                <div
                class="flex gap-3 flex-wrap mb-5"
                >

                    ${deal.discount !== "0% OFF"
                    ?

                    `<div class="bg-orange-500 px-4 py-2 rounded-full font-bold text-sm">
                        ${deal.discount}
                    </div>`

                    :

                    ""
                    }

                    <div class="bg-blue-500 px-4 py-2 rounded-full font-bold text-sm">
                        ${deal.category}
                    </div>

                    <div class="bg-black/70 px-4 py-2 rounded-full font-bold text-sm">
                        ${deal.store}
                    </div>

                </div>

                <h1
                class="text-3xl lg:text-5xl font-black text-white leading-tight"
                >
                    ${deal.title}
                </h1>

            </div>

        </div>

        <div class="p-6">

            <!-- DESCRIPTION -->

            <div
            class="glass rounded-3xl p-6"
            >

                <div
                class="text-2xl font-black text-orange-400 mb-5"
                >
                    📄 Full Description
                </div>

                <div
                class="text-slate-300 leading-8 whitespace-pre-line text-[15px]"
                >
                    ${deal.caption}
                </div>

            </div>

            <!-- LINKS -->

            <div
            class="grid gap-4 mt-7"
            >

                ${buttons}

            </div>

        </div>

    `;

    document.getElementById(
        "dealModal"
    ).style.display = "flex";
}

/* CLOSE */

function closeModal(){

    document.getElementById(
        "dealModal"
    ).style.display = "none";
}

/* OUTSIDE CLICK */

window.onclick = function(event){

    const modal = document.getElementById(
        "dealModal"
    );

    if(event.target === modal){

        closeModal();
    }
}

/* SEARCH */

document.getElementById(
    "searchInput"
).addEventListener(
    "input",
    renderDeals
);

/* CATEGORY */

document.querySelectorAll(
    ".category-btn"
).forEach(btn=>{

    btn.addEventListener("click",()=>{

        document.querySelectorAll(
            ".category-btn"
        ).forEach(b=>
            b.classList.remove("active-cat")
        );

        btn.classList.add("active-cat");

        currentCategory =
            btn.dataset.category;

        renderDeals();
    });
});

/* LOAD */

loadDeals();

/* AUTO REFRESH */

setInterval(
    loadDeals,
    30000
);

</script>

</body>

</html>
