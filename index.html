<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    🔥 Best Deals
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
>

<style>

*{
    font-family:Poppins,sans-serif;
}

body{
    background:#f5f5f5;
}

.category-btn{

    background:white;
    padding:10px 18px;
    border-radius:999px;
    font-weight:600;
    border:1px solid #ddd;
    white-space:nowrap;
}

.active-cat{

    background:#f97316;
    color:white;
}

.deal-card{
    transition:0.3s;
}

.deal-card:hover{
    transform:translateY(-5px);
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-white shadow sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-4 py-4">

        <div class="flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

            <div>

                <h1 class="text-3xl font-black text-orange-500">
                    🔥 Best Deals
                </h1>

                <p class="text-gray-500">
                    Auto Updated in Every 15 min
                </p>

            </div>

            <!-- SEARCH -->

            <input
                id="searchInput"
                type="text"
                placeholder="Search deals..."
                class="border rounded-2xl px-5 py-3 w-full md:w-80 outline-none"
            >

        </div>

        <!-- CATEGORY -->

        <div class="flex gap-3 mt-5 overflow-auto pb-2">

            <button class="category-btn active-cat" data-category="All">
                All
            </button>

            <button class="category-btn" data-category="Mobiles">
                Mobiles
            </button>

            <button class="category-btn" data-category="Laptops">
                Laptops
            </button>

            <button class="category-btn" data-category="Fashion">
                Fashion
            </button>

            <button class="category-btn" data-category="Electronics">
                Electronics
            </button>

            <button class="category-btn" data-category="Other">
                Other
            </button>

        </div>

    </div>

</header>

<!-- DEALS -->

<main class="max-w-7xl mx-auto px-4 py-8">

    <div
        id="deals-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
    >

    </div>

</main>

<script>

let allDeals = [];

let currentCategory = "All";

async function loadDeals(){

    const response = await fetch(
        "deals.json?t=" + Date.now()
    );

    allDeals = await response.json();

    renderDeals();
}

function renderDeals(){

    const container =
        document.getElementById(
            "deals-container"
        );

    const search =
        document.getElementById(
            "searchInput"
        ).value.toLowerCase();

    container.innerHTML = "";

    let filtered = allDeals.filter(deal => {

        const matchesSearch =

            deal.title.toLowerCase()
            .includes(search)

            ||

            deal.caption.toLowerCase()
            .includes(search);

        const matchesCategory =

            currentCategory === "All"

            ||

            deal.category === currentCategory;

        return (
            matchesSearch &&
            matchesCategory
        );
    });

    if(filtered.length === 0){

        container.innerHTML = `

            <div class="col-span-full text-center py-20">

                <h2 class="text-3xl font-bold text-gray-400">
                    No Deals Found
                </h2>

            </div>

        `;

        return;
    }

    filtered.forEach(deal => {

        const buttons =

            deal.all_links.map((link,index)=>`

                <a
                    href="${link}"
                    target="_blank"
                    class="block bg-orange-500 hover:bg-orange-600 text-white text-center py-3 rounded-2xl font-bold"
                >

                    🔥 Grab Deal ${index+1}

                </a>

            `).join("");

        const card = `

        <div class="deal-card bg-white rounded-3xl overflow-hidden shadow-md">

            <img
                src="${deal.image}"
                class="w-full h-72 object-cover"
            >

            <div class="p-5">

                <div class="flex items-center justify-between mb-3">

                    <span class="bg-orange-500 text-white px-3 py-1 rounded-full text-xs font-bold">

                        ${deal.category}

                    </span>

                    <span class="bg-gray-800 text-white px-3 py-1 rounded-full text-xs font-bold">

                        ${deal.store}

                    </span>

                </div>

                <h2 class="text-xl font-black text-gray-800 leading-tight">

                    ${deal.title}

                </h2>

                <div class="flex items-center gap-3 mt-4">

                    <span class="text-3xl font-black">

                        ₹${deal.new_price}

                    </span>

                    <span class="line-through text-gray-400">

                        ₹${deal.old_price}

                    </span>

                </div>

                <div class="mt-2 text-red-500 font-bold">

                    ${deal.discount}

                </div>

                ${deal.live_price
                    ? `
                    <div class="mt-3 text-green-600 font-bold">
                        Live Price: ${deal.live_price}
                    </div>
                    `
                    : ""
                }

                <div class="mt-5 space-y-3">

                    ${buttons}

                </div>

            </div>

        </div>

        `;

        container.innerHTML += card;
    });
}

document.getElementById(
    "searchInput"
).addEventListener(
    "input",
    renderDeals
);

document.querySelectorAll(
    ".category-btn"
).forEach(btn => {

    btn.addEventListener("click", () => {

        document.querySelectorAll(
            ".category-btn"
        ).forEach(b =>
            b.classList.remove("active-cat")
        );

        btn.classList.add("active-cat");

        currentCategory =
            btn.dataset.category;

        renderDeals();
    });
});

loadDeals();

setInterval(
    loadDeals,
    30000
);

</script>

</body>

</html>
