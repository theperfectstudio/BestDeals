<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Redirecting...
</title>

<style>

body{

    background:#020617;

    color:white;

    font-family:sans-serif;

    display:flex;

    align-items:center;

    justify-content:center;

    height:100vh;

    flex-direction:column;
}

.loader{

    width:60px;
    height:60px;

    border:5px solid #334155;

    border-top:5px solid orange;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin-bottom:20px;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

</style>

</head>

<body>

<div class="loader"></div>

<h2>
Redirecting To Best Deals...
</h2>

<script>

const params =
new URLSearchParams(
    window.location.search
);

const store =
params.get("store");

const query =
params.get("q");

if(!query){

    window.location.href =
    "./";
}

let finalUrl = "";

/* AMAZON */

if(store === "amazon"){

    finalUrl =

    "https://www.amazon.in/s?k="

    +

    encodeURIComponent(query);
}

/* FLIPKART */

else if(store === "flipkart"){

    finalUrl =

    "https://www.flipkart.com/search?q="

    +

    encodeURIComponent(query);
}

/* GOOGLE */

else{

    finalUrl =

    "https://www.google.com/search?q="

    +

    encodeURIComponent(query);
}

/* REDIRECT */

window.location.href =
finalUrl;

</script>

</body>

</html>
