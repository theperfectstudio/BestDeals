<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Live Deals</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body {
    font-family: sans-serif;
}

.telegram-caption {
    white-space: pre-line;
}

</style>

</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-gradient-to-r from-red-600 to-orange-500 text-white py-6 shadow-lg">

<div class="max-w-7xl mx-auto px-4 flex items-center justify-between">

<div>
<h1 class="text-3xl font-black">
🔥 Live Telegram Deals
</h1>

<p class="opacity-90 text-sm mt-1">
Auto Updated Every 30 Seconds
</p>
</div>

<div class="bg-white/20 px-4 py-2 rounded-xl font-bold text-sm">
🟢 LIVE
</div>

</div>

</header>

<main class="max-w-7xl mx-auto px-4 py-8">

<div
id="deals-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
>

<div class="text-center py-20 col-span-full">
Loading Deals...
</div>

</div>

</main>

<script>

// =====================================================
// LOAD DEALS
// =====================================================

async function loadDeals() {

    try {

        const response = await fetch(
            "deals.json?t=" + Date.now()
        );

        const deals = await response.json();

        renderDeals(deals);

    }
    catch (error) {

        console.error(error);

        document.getElementById(
            "deals-container"
        ).innerHTML = `

        <div class="text-center py-20 col-span-full">

            <h2 class="text-red-500 text-3xl font-bold">
                Failed To Load Deals
            </h2>

        </div>
        `;
    }
}

// =====================================================
// RENDER DEALS
// =====================================================

function renderDeals(deals) {

    const container =
        document.getElementById("deals-container");

    container.innerHTML = "";

    if (!deals.length) {

        container.innerHTML = `
        <div class="text-center py-20 col-span-full">
            No Deals Found
        </div>`;

        return;
    }

    deals.forEach(deal => {

        let badgeColor = "bg-gray-700";

        if (deal.store === "Amazon")
            badgeColor = "bg-amber-500";

        if (deal.store === "Flipkart")
            badgeColor = "bg-blue-600";

        if (deal.store === "Myntra")
            badgeColor = "bg-pink-600";

        const card = `

        <div class="bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-2xl transition duration-300">

            <!-- IMAGE -->

            <div class="relative bg-gray-100 overflow-hidden">

                <img
                    src="${deal.image}"
                    class="w-full h-72 object-cover"
                    onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'"
                >

                <span class="absolute top-3 left-3 bg-red-500 text-white px-3 py-1 rounded-xl text-sm font-black shadow-lg">
                    ${deal.discount}
                </span>

                <span class="absolute top-3 right-3 ${badgeColor} text-white px-3 py-1 rounded-xl text-sm font-bold shadow-lg">
                    ${deal.store}
                </span>

            </div>

            <!-- CONTENT -->

            <div class="p-5">

                <h2 class="text-xl font-black text-gray-900 leading-tight">
                    ${deal.title}
                </h2>

                <!-- PRICES -->

                <div class="flex items-center gap-3 mt-4">

                    <span class="text-3xl font-black text-gray-900">
                        ₹${deal.new_price}
                    </span>

                    <span class="text-lg text-gray-400 line-through">
                        ₹${deal.old_price}
                    </span>

                </div>

                <!-- CAPTION -->

                <div class="telegram-caption mt-4 text-gray-700 text-sm leading-7 max-h-40 overflow-y-auto">
                    ${deal.caption}
                </div>

                <!-- BUTTON -->

                <a
                    href="${deal.main_link}"
                    target="_blank"
                    class="block text-center mt-6 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-black py-4 rounded-2xl transition"
                >
                    Grab Deal ➜
                </a>

            </div>

        </div>
        `;

        container.innerHTML += card;
    });
}

// =====================================================
// AUTO REFRESH
// =====================================================

loadDeals();

setInterval(loadDeals, 30000);

</script>

</body>
</html>
